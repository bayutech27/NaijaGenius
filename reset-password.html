<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NaijaGenius • Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card fade-in-up">
            <div class="brand-header">
                <h1 class="logo"><span class="naija">Naija</span><span class="genius">Genius</span></h1>
                <p class="tagline">Recover your account</p>
            </div>

            <form id="resetForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="resetEmail" placeholder="Your registered email" autocomplete="email" required>
                </div>

                <button type="submit" id="resetBtn" class="auth-btn">
                    <span>Get Reset Link</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="auth-links">
                <p>Remember password? <a href="login.html" class="highlight-link">Login</a></p>
            </div>
        </div>
    </div>

    <!-- Modal for reset success -->
    <div id="resetModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <i class="fas fa-envelope-open-text modal-icon"></i>
            <h3>Check Your Email</h3>
            <p>Password reset link has been sent to your registered email.<br><br>Please check your Inbox.<br>If you do not find it there, kindly check your Spam/Junk folder.</p>
            <button id="closeModalBtn" class="auth-btn modal-btn">Got it</button>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script type="module" src="/js/auth.js"></script>
</body>
</html>
