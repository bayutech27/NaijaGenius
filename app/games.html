<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NaijaGenius • Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/css/games.css" />
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-container">
            <div class="logo-wrapper">
                <h1 class="brand-logo"><span class="naija-white">Naija</span><span class="genius-mint">Genius</span></h1>
            </div>
            <div class="header-actions">
                <a href="/app/dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="game-container">
        <!-- Meta Bar – added Difficulty row -->
        <div class="game-meta-bar">
            <div class="meta-item">
                <span class="meta-label"><i class="fas fa-tag"></i> Game Type</span>
                <span id="gameType" class="meta-value">Regular</span>
            </div>
            <div class="meta-item">
                <span class="meta-label"><i class="fas fa-list"></i> Category</span>
                <span id="gameCategory" class="meta-value">Afrobeats</span>
            </div>
            <!-- NEW: Difficulty -->
            <div class="meta-item">
                <span class="meta-label"><i class="fas fa-signal"></i> Difficulty</span>
                <span id="gameDifficulty" class="meta-value">Easy</span>
            </div>
            <div class="meta-item timer-wrapper">
                <span class="meta-label"><i class="fas fa-hourglass-half"></i> Time</span>
                <div class="circular-timer" id="timerDisplay">
                    <svg viewBox="0 0 36 36" class="timer-svg">
                        <path class="timer-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="timer-progress" id="timerPath" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <span class="timer-seconds" id="timerSeconds">12</span>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar" style="width: 10%;"></div>
            <span class="progress-label" id="progressLabel">Question 1 of 10</span>
        </div>

        <!-- Question Box (inset shadow applied via CSS) -->
        <div class="question-box glass-card">
            <div class="question-number" id="questionNumber">Loading…</div>
            <p class="question-text" id="questionText">Loading question…</p>
        </div>

        <!-- Options Grid – single column (class .single-column added via CSS) -->
        <div class="options-grid">
            <button class="option-btn" id="optionA" data-option="A">
                <span class="option-letter">A</span>
                <span class="option-text" id="optionAText">Loading…</span>
            </button>
            <button class="option-btn" id="optionB" data-option="B">
                <span class="option-letter">B</span>
                <span class="option-text" id="optionBText">Loading…</span>
            </button>
            <button class="option-btn" id="optionC" data-option="C">
                <span class="option-letter">C</span>
                <span class="option-text" id="optionCText">Loading…</span>
            </button>
            <button class="option-btn" id="optionD" data-option="D">
                <span class="option-letter">D</span>
                <span class="option-text" id="optionDText">Loading…</span>
            </button>
        </div>

        <!-- Lifelines Row + NEW Next Button -->
        <div class="lifelines-row">
            <button class="lifeline-btn" id="lifelineFiftyFifty">
                <i class="fas fa-percent"></i>
                <span class="lifeline-label">50:50</span>
                <span class="lifeline-count" id="countFiftyFifty">1</span>
            </button>
            <button class="lifeline-btn" id="lifelineAskCrowd">
                <i class="fas fa-users"></i>
                <span class="lifeline-label">Ask Crowd</span>
                <span class="lifeline-count" id="countAskCrowd">1</span>
            </button>
            <button class="lifeline-btn" id="lifelineSkip">
                <i class="fas fa-forward-step"></i>
                <span class="lifeline-label">Skip</span>
                <span class="lifeline-count" id="countSkip">1</span>
            </button>
            <!-- NEW: Next Button -->
            <button class="next-btn" id="nextBtn" disabled>
                <i class="fas fa-forward"></i> Next
            </button>
        </div>

        <!-- Ask Crowd Panel -->
        <div class="crowd-panel" id="crowdPanel">
            <div class="crowd-bar-wrapper">
                <span class="crowd-label">A</span>
                <div class="crowd-bar-bg">
                    <div class="crowd-bar-fill" id="crowdBarA" style="width: 0%;"></div>
                </div>
                <span class="crowd-percent" id="crowdPercentA">0%</span>
            </div>
            <div class="crowd-bar-wrapper">
                <span class="crowd-label">B</span>
                <div class="crowd-bar-bg">
                    <div class="crowd-bar-fill" id="crowdBarB" style="width: 0%;"></div>
                </div>
                <span class="crowd-percent" id="crowdPercentB">0%</span>
            </div>
            <div class="crowd-bar-wrapper">
                <span class="crowd-label">C</span>
                <div class="crowd-bar-bg">
                    <div class="crowd-bar-fill" id="crowdBarC" style="width: 0%;"></div>
                </div>
                <span class="crowd-percent" id="crowdPercentC">0%</span>
            </div>
            <div class="crowd-bar-wrapper">
                <span class="crowd-label">D</span>
                <div class="crowd-bar-bg">
                    <div class="crowd-bar-fill" id="crowdBarD" style="width: 0%;"></div>
                </div>
                <span class="crowd-percent" id="crowdPercentD">0%</span>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/app/dashboard.html#home" class="nav-item"><i class="fas fa-house"></i><span class="nav-dot"></span></a>
        <a href="/app/dashboard.html#play" class="nav-item active"><i class="fas fa-gamepad"></i><span class="nav-dot"></span></a>
        <a href="/app/dashboard.html#leaderboard" class="nav-item"><i class="fas fa-trophy"></i><span class="nav-dot"></span></a>
        <a href="/app/dashboard.html#earnings" class="nav-item"><i class="fas fa-coins"></i><span class="nav-dot"></span></a>
        <a href="/app/dashboard.html#profile" class="nav-item"><i class="fas fa-user"></i><span class="nav-dot"></span></a>
    </nav>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="/js/games.js"></script>
</body>
</html>
