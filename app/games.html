<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NaijaGenius • Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇳🇬</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/css/games.css" />
</head>
<body>
    <!-- Header: back arrow, circular timer, coins -->
    <header class="app-header">
        <div class="header-container">
            <a href="/app/dashboard.html" class="back-btn" aria-label="Back to Dashboard">
                <i class="fas fa-arrow-left"></i>
            </a>

            <div class="header-timer-wrap">
                <div class="circular-timer" id="timerDisplay">
                    <svg viewBox="0 0 36 36" class="timer-svg">
                        <path class="timer-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="timer-progress" id="timerPath" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="timer-center">
                        <span class="timer-seconds" id="timerSeconds">15</span>
                        <span class="timer-unit">SEC</span>
                    </div>
                </div>
            </div>

            <div class="header-actions">
                <span class="game-coins-badge" id="gameCoinsBadge">
                    <i class="fas fa-coins"></i>
                    <span id="gameCoinsValue">0</span>
                </span>
            </div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="game-container">

        <!-- Question Box (question number + text + segmented progress) -->
        <div class="question-box glass-card">
            <div class="question-number-row">
                <i class="fas fa-comment-dots question-number-icon" aria-hidden="true"></i>
                <div class="question-number" id="questionNumber">Loading…</div>
            </div>
            <p class="question-text" id="questionText">Loading question…</p>

            <div class="progress-wrapper">
                <div class="progress-bar" id="progressBar" style="width: 10%;"></div>
                <span class="progress-label" id="progressLabel">Question 1 of 10</span>
            </div>
        </div>

        <!-- Options -->
        <div class="options-grid">
            <button class="option-btn" id="optionA" data-option="A">
                <span class="option-letter">A</span>
                <span class="option-text" id="optionAText">Loading…</span>
                <div class="option-crowd" style="display:none;">
                    <div class="crowd-bar-bg">
                        <div class="crowd-bar-fill" id="crowdBarA" style="width:0%;"></div>
                    </div>
                    <span class="crowd-percent" id="crowdPercentA">0%</span>
                </div>
            </button>
            <button class="option-btn" id="optionB" data-option="B">
                <span class="option-letter">B</span>
                <span class="option-text" id="optionBText">Loading…</span>
                <div class="option-crowd" style="display:none;">
                    <div class="crowd-bar-bg">
                        <div class="crowd-bar-fill" id="crowdBarB" style="width:0%;"></div>
                    </div>
                    <span class="crowd-percent" id="crowdPercentB">0%</span>
                </div>
            </button>
            <button class="option-btn" id="optionC" data-option="C">
                <span class="option-letter">C</span>
                <span class="option-text" id="optionCText">Loading…</span>
                <div class="option-crowd" style="display:none;">
                    <div class="crowd-bar-bg">
                        <div class="crowd-bar-fill" id="crowdBarC" style="width:0%;"></div>
                    </div>
                    <span class="crowd-percent" id="crowdPercentC">0%</span>
                </div>
            </button>
            <button class="option-btn" id="optionD" data-option="D">
                <span class="option-letter">D</span>
                <span class="option-text" id="optionDText">Loading…</span>
                <div class="option-crowd" style="display:none;">
                    <div class="crowd-bar-bg">
                        <div class="crowd-bar-fill" id="crowdBarD" style="width:0%;"></div>
                    </div>
                    <span class="crowd-percent" id="crowdPercentD">0%</span>
                </div>
            </button>
        </div>

        <!-- Lifelines + Next -->
        <div class="lifelines-row">
            <button class="lifeline-btn" id="lifelineFiftyFifty">
                <i class="fas fa-percent"></i>
                <span class="lifeline-label">50/50</span>
                <span class="lifeline-count" id="countFiftyFifty">1</span>
            </button>
            <button class="lifeline-btn" id="lifelineAskCrowd">
                <i class="fas fa-users"></i>
                <span class="lifeline-label">Ask Crowd</span>
                <span class="lifeline-count" id="countAskCrowd">1</span>
            </button>
            <button class="lifeline-btn" id="lifelineCallFriend">
                <i class="fas fa-phone"></i>
                <span class="lifeline-label">Call a Friend</span>
                <span class="lifeline-count" id="countCallFriend">1</span>
            </button>
            <button class="next-btn" id="nextBtn" disabled>
                <i class="fas fa-forward"></i>
                <span class="next-btn-label">Next</span>
            </button>
        </div>

    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="/js/games.js"></script>
</body>
</html>
